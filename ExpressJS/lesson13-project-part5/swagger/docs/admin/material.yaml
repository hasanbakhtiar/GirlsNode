openapi: 3.0.0
info:
  title: Material API
  version: 1.0.0
  description: Material CRUD API documentation

servers:
  - url: http://localhost:5000/api

paths:
  /material:
    post:
      summary: Create new material
      tags:
        - Material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialInput'
      responses:
        201:
          description: Material created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Material'
        400:
          description: Validation error

  /material/{id}:
    put:
      summary: Update material by ID
      tags:
        - Material
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: MongoDB ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialInput'
      responses:
        200:
          description: Material updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Material'
        400:
          description: Validation error

    delete:
      summary: Delete material by ID
      tags:
        - Material
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: MongoDB ObjectId
      responses:
        200:
          description: Material deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusMessage:
                    type: string
                  data:
                    $ref: '#/components/schemas/Material'

components:
  schemas:
    Material:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MaterialInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Wood
